<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; }

#loginBox {
  position: fixed;
  inset: 0;
  background: #1a2e4a;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

#loginBox .card {
  background: white;
  padding: 40px;
  border-radius: 12px;
  width: 360px;
}

#loginBox h2 { margin-bottom: 20px; color: #1a2e4a; }
#loginBox input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
}
#loginBox button {
  width: 100%;
  padding: 12px;
  background: #e8612a;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}
#err { color: red; font-size: 12px; margin-bottom: 10px; display: none; }

#mainApp {
  display: none;
  height: 100vh;
  flex-direction: column;
}

.header {
  background: #1a2e4a;
  color: white;
  padding: 16px 24px;
  border-bottom: 3px solid #e8612a;
  font-size: 18px;
  font-weight: bold;
}

.content {
  flex: 1;
  padding: 32px;
  background: #f4f6fb;
  overflow-y: auto;
}

.content h2 { color: #1a2e4a; margin-bottom: 16px; }
.content p { color: #666; }
</style>
</head>
<body>

<div id="loginBox">
  <div class="card">
    <h2>Anmelden</h2>
    <input type="email" id="email" placeholder="E-Mail" />
    <input type="password" id="pw" placeholder="Passwort" />
    <div id="err"></div>
    <button onclick="login()">Anmelden</button>
  </div>
</div>

<div id="mainApp">
  <div class="header">Die Coachingexperten – Businessplan-Tool</div>
  <div class="content">
    <h2>Willkommen!</h2>
    <p>Sie sind erfolgreich eingeloggt.</p>
  </div>
</div>

<script type="module">
try {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
  const { getAuth, signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
  
  const app = initializeApp({
    apiKey: "AIzaSyANOJHOHAgrbfiQG0H6mseqTgKhGz3mmbI",
    authDomain: "die-coachingexperten-abdfa.firebaseapp.com",
    projectId: "die-coachingexperten-abdfa",
    storageBucket: "die-coachingexperten-abdfa.firebasestorage.app",
    messagingSenderId: "78028063080",
    appId: "1:78028063080:web:87b621433bc5445c3996dd"
  });
  
  const auth = getAuth(app);
  window._auth = auth;
  window._signIn = signInWithEmailAndPassword;
  console.log('Firebase bereit ✓');
} catch(e) {
  console.log('Fehler:', e);
}
</script>

<script>
async function login() {
  const email = document.getElementById('email').value;
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  
  if (!email || !pw) {
    err.textContent = 'Bitte E-Mail und Passwort eingeben.';
    err.style.display = 'block';
    return;
  }
  
  try {
    await window._signIn(window._auth, email, pw);
    // Login erfolgreich - zeige App
    document.getElementById('loginBox').remove();
    const app = document.getElementById('mainApp');
    app.style.display = 'flex';
    console.log('Login erfolgreich!');
  } catch(e) {
    err.textContent = 'Falsche E-Mail oder Passwort.';
    err.style.display = 'block';
  }
}
</script>

</body>
</html>
